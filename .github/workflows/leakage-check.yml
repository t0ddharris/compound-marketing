name: Generator hygiene

on:
  pull_request:
  push:
    branches: [main]

jobs:
  leakage-check:
    name: leakage-check
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Scan for company-specific leakage
        run: ./scripts/check-leakage.sh
