extends: existence
message: "Weak/filler word '%s' — cut it or replace with something specific."
level: warning
ignorecase: true
tokens:
  - "very"
  - "really"
  - "extremely"
  - "incredibly"
  - "absolutely"
  - "basically"
  - "certainly"
  - "clearly"
  - "definitely"
  - "essentially"
  - "fundamentally"
  - "interestingly"
  - "naturally"
  - "obviously"
  - "significantly"
  - "surely"
  - "truly"
  - "undoubtedly"
  - "furthermore"
  - "moreover"
  - "notwithstanding"
  - "that being said"
  - "at its core"
  - "to put it simply"
  - "in order to"
